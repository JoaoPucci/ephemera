# pyproject.toml
#
# Presently a home for tool config only -- ephemera isn't packaged as a
# distributable library, so there's no `[project]` table describing an
# installable artifact. Add one later if that ever changes.

[tool.ruff]
# 88 columns is Black's default and the prevailing width across the
# modern Python ecosystem (FastAPI, httpx, pydantic, etc.).
line-length = 88
target-version = "py312"
extend-exclude = [
  # Keep Ruff off generated / vendored / environment trees.
  "venv",
  "node_modules",
  "app/static/swagger",
]

[tool.ruff.lint]
# Rule set modelled on what FastAPI and peers ship:
#   E, W    pycodestyle (errors and warnings)
#   F       pyflakes (unused imports, undefined names, etc.)
#   I       isort (import ordering)
#   B       flake8-bugbear (common real-world anti-patterns)
#   UP      pyupgrade (suggest modern syntax for the pinned Python)
#   SIM     flake8-simplify (obvious boolean / conditional simplifications)
#   C901    mccabe cyclomatic complexity ceiling -- a tripwire for
#           functions that grow into hard-to-reason-about branchy
#           shapes. Threshold is set in [tool.ruff.lint.mccabe] below.
select = ["E", "W", "F", "I", "B", "UP", "SIM", "C901"]
ignore = [
  # E501 (line too long) is delegated to the formatter -- it handles wrapping
  # when it can, and when it can't (long URLs, long test assertions), failing
  # the lint doesn't add signal.
  "E501",
]

[tool.ruff.lint.per-file-ignores]
# Tests may intentionally keep unused variables for readability
# (e.g. `alice, bob = make_user("a"), make_user("b")` even if `bob` never
# appears later in the body). Allow F841 there without loosening it globally.
"tests/**" = ["F841"]
"tests-e2e/**" = ["F841"]

[tool.ruff.lint.mccabe]
# Cyclomatic-complexity ceiling for the C901 rule above. ruff's default
# is 10; we relax to 12 because legitimate state-machine-shaped code in
# this project (init_db, authenticate, the v3 migration, the reveal
# route) lands in the 11-12 range without being pathological. Above 12
# is a real signal that a function is doing too many things.
#
# Two functions presently sit above 12 and carry an explicit
# `# noqa: C901` annotation with a rationale:
#   - app/analytics.py::_validate_payload (19) -- registry-driven
#     validation; splitting hides complexity in helper calls without
#     reducing the cognitive load.
#   - app/routes/sender.py::create_secret (13) -- route handler that
#     gathers, validates, encrypts, persists in one linear flow;
#     splitting into helpers would obscure the request-lifecycle.
# Both are deliberate deferrals; pull the noqa and refactor when the
# function next changes shape.
max-complexity = 12

[tool.ruff.lint.flake8-bugbear]
# FastAPI's dependency-injection idiom is `param: T = Depends(fn)` -- a
# function call in a default argument, which B008 flags by default.
# The values returned by these helpers are scoped per-request, so the
# usual "mutable default shared across calls" risk that B008 targets
# doesn't apply. List the FastAPI helpers here so Ruff stops flagging
# the standard pattern.
extend-immutable-calls = [
  "fastapi.Depends",
  "fastapi.Query",
  "fastapi.Header",
  "fastapi.Path",
  "fastapi.Body",
  "fastapi.Cookie",
  "fastapi.File",
  "fastapi.Form",
  "fastapi.Security",
]

[tool.ruff.format]
# Ruff's default format rules already match Black, which is what the
# existing code was loosely written in. No overrides needed.

[tool.mutmut]
# Mutation testing configuration consumed by .github/workflows/
# mutation-test.yml (weekly schedule; manual workflow_dispatch trigger
# also wired). Mutmut mutates the codebase line-by-line and re-runs
# the test suite to find places where tests don't catch broken code
# -- "test theatre" that coverage% alone won't surface.
#
# Scope is deliberately limited to the highest-leverage / security-
# relevant modules for v1: a full-codebase mutation run on ephemera's
# ~190 callables would blow GitHub Actions' 6-hour per-job ceiling
# on hosted runners. Expand the list as test-suite speed and runner
# capacity allow.
paths_to_mutate = [
  # SCOPE NOTE -- v1 minimum-viable mutation. validation.py only.
  #
  # Earlier attempts scoped paths_to_mutate to the security-leverage
  # set (crypto.py + validation.py + auth/ + dependencies.py).
  # Two CI runs (#111, post-#113) reveal a hard interaction between
  # mutmut's stats-collection environment and cryptography's
  # PyO3-backed Rust bindings: the Rust HKDF binding raises
  # `TypeError: Expected instance of hashes.HashAlgorithm.` on a
  # `hashes.SHA256()` value that the same binding accepts in plain
  # pytest runs. The failure happens REGARDLESS of whether crypto.py
  # is in paths_to_mutate or just in also_copy -- so it isn't about
  # mutmut's source-instrumentation at all; something in mutmut's
  # stats-phase environment (env vars / module globals / process
  # state) breaks cryptography's class-identity check.
  #
  # The provoking call chain runs through provisioned_user ->
  # models.create_user -> encrypt_at_rest -> _at_rest_key -> HKDF.
  # Every test that uses the provisioned_user fixture trips it, so
  # narrowing paths_to_mutate alone doesn't help -- mutmut's pytest
  # invocation still collects ALL tests under tests_dir during stats.
  #
  # Workaround: limit BOTH paths_to_mutate AND tests_dir to a
  # cryptography-free island. validation.py + tests/test_validation.py
  # is that island -- pure-Python magic-byte detection, no auth, no
  # bcrypt, no Fernet, no HKDF. Proves the mutmut infrastructure
  # works at all on this codebase. Expand once we have a tighter MRE
  # for the cryptography interaction (file upstream against mutmut,
  # or work around in our code).
  "app/validation.py",
]
# Pair `tests_dir` to `paths_to_mutate`: only run the tests that
# exercise the mutated module. With paths_to_mutate=validation.py,
# only test_validation.py is relevant -- and crucially, this test
# file uses zero crypto / auth / Fernet / bcrypt code paths, so it
# avoids the mutmut-x-PyO3 trip wire entirely.
tests_dir = ["tests/test_validation.py"]
# `mutate_only_covered_lines` limits mutation generation to lines the
# test suite actually exercises -- a mutant on dead code would
# trivially "survive" (no test could catch it because no test ever
# reaches that line) and add noise to the report.
mutate_only_covered_lines = true
# Skip the test-only and infra files that happen to live under the
# scoped paths. Mutating dependencies.py's bootstrapping branches
# isn't actionable; same for any __init__.py glue.
do_not_mutate = [
  "*/__init__.py",
]
# `paths_to_mutate` only copies the files it mutates into mutmut's
# sandbox; the rest of the `app/` package (other modules, the
# package's own __init__.py, app.admin, app.routes, etc.) has to be
# copied as-is so imports like `from app import admin` resolve when
# the test suite runs against the mutated tree. `also_copy` is the
# right lever -- copy-but-don't-mutate.
#
# Listed explicitly per-path rather than `also_copy = ["app/"]`
# because the package list overlaps with `paths_to_mutate` and the
# overlap is brittle: even if the current mutmut version copies in
# a safe order (mutants generated AFTER also_copy, so no clobber
# today), a future copy-order change could turn the overlap into
# a silent correctness regression where mutated files get
# overwritten with originals before tests run. Listing only the
# non-mutated subset keeps the contract straightforward: each
# `also_copy` entry is "as-is", every `paths_to_mutate` entry is
# "mutated", no file appears in both. When a new top-level module
# lands under `app/`, decide whether to mutate it (add to
# paths_to_mutate) or keep it as-is (add here) -- both can't be
# true.
also_copy = [
  "conftest.py",
  "app/__init__.py",
  "app/admin/",
  "app/analytics.py",
  # app/auth/ moved here from paths_to_mutate after the cryptography
  # PyO3 interaction (see the SCOPE NOTE above). Bcrypt in auth/ is
  # also Rust-backed; restoring to paths_to_mutate awaits the same
  # upstream resolution.
  "app/auth/",
  "app/cleanup.py",
  "app/config.py",
  # app/crypto.py here for the same reason as auth/ -- see SCOPE
  # NOTE in paths_to_mutate above.
  "app/crypto.py",
  # app/dependencies.py here too -- moved out of paths_to_mutate
  # alongside auth/, since `app/__init__.py` imports from it
  # (`from .dependencies import verify_api_token_or_session`) and
  # leaving it absent breaks the import chain even though it never
  # gets mutated.
  "app/dependencies.py",
  "app/errors.py",
  "app/i18n.py",
  "app/limiter.py",
  "app/models/",
  "app/routes/",
  "app/schemas.py",
  "app/security_headers.py",
  "app/security_log.py",
  "app/static/",
  "app/templates/",
  "app/translations/",
  "app/version.py",
]

[tool.coverage.run]
# Coverage data is generated on demand: CI invokes pytest with --cov;
# local runs are unaffected unless the developer opts in. The config
# here controls what gets measured, not whether it runs.
source = ["app"]
branch = true
omit = [
  "app/templates/*",       # Jinja, not Python -- extracted via babel.cfg
  "app/translations/*",    # gettext .po/.mo data files
  "app/static/swagger/*",  # vendored Swagger UI assets
]

[tool.coverage.report]
# Lines that coverage.py can't usefully reason about. Anything matching
# these patterns is excluded from the "missed" tally without needing a
# `# pragma: no cover` annotation in source.
exclude_lines = [
  "pragma: no cover",
  "if __name__ == .__main__.:",
  "raise NotImplementedError",
  "\\.\\.\\.",  # bare `...` body in Protocol / ABC stubs
]
show_missing = true
precision = 1
