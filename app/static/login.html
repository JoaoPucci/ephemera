<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>ephemera — sign in</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/theme.js"></script>
</head>
<body>
  <button type="button" id="theme-toggle" class="theme-toggle" aria-label="toggle theme">dark</button>
  <div class="wordmark">ephemera</div>
  <main class="card">
    <form id="login-form">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username"
             autocapitalize="none" spellcheck="false" required>

      <label for="password">Password</label>
      <div class="input-with-action">
        <input type="password" id="password" name="password" autocomplete="current-password" required>
        <button type="button" id="toggle-password" class="input-action"
                aria-label="show password" aria-pressed="false">show</button>
      </div>

      <label for="code" id="code-label">6-digit code</label>
      <input type="text" id="code" name="code" autocomplete="one-time-code"
             inputmode="numeric" pattern="[0-9A-Za-z\-]*" required>

      <button type="submit">Sign in</button>

      <p class="error" id="login-error" hidden></p>
      <p class="muted" style="margin-top: 1rem; text-align: left;">
        <button type="button" id="toggle-code-mode" class="link" style="padding:0;">Use a recovery code</button>
      </p>
    </form>
  </main>
  <script type="module" src="/static/login.js"></script>
</body>
</html>
