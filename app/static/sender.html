<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>ephemera — create secret</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/theme.js"></script>
</head>
<body>
  <button type="button" id="theme-toggle" class="theme-toggle" aria-label="toggle theme">dark</button>
  <button type="button" id="user-btn" class="user-btn" aria-label="sign out">
    <span class="user-dot" aria-hidden="true"></span><span
          id="user-name">&hellip;</span><span class="user-sep" aria-hidden="true">·</span><span
          class="user-action">sign out</span>
  </button>
  <div class="wordmark">ephemera</div>
  <main class="card" id="main-card">
    <section id="tracked-section" hidden>
      <button type="button" id="tracked-header" class="tracked-panel-header" aria-expanded="false" aria-controls="tracked-body">
        <span class="tracked-panel-title">Secrets you're tracking</span>
        <span id="tracked-count" class="tracked-panel-count">0</span>
        <span class="tracked-panel-chevron" aria-hidden="true"></span>
      </button>
      <div id="tracked-body" class="tracked-panel-body">
        <div class="tracked-panel-inner">
          <ul id="tracked-list"></ul>
          <div class="tracked-panel-footer">
            <button type="button" id="tracked-clear" class="tracked-clear" hidden
                    title="Remove every row that is no longer pending — pending secrets are kept">
              <!-- Feather "trash-2" icon (MIT). currentColor inherits the button's
                   theme/armed foreground so it tints danger-red when armed. -->
              <svg class="tracked-clear-icon" width="14" height="14" viewBox="0 0 24 24"
                   fill="none" stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6l-1.5 14.5a2 2 0 0 1-2 1.5h-9a2 2 0 0 1-2-1.5L3 6"></path>
                <line x1="10" y1="11" x2="10" y2="17"></line>
                <line x1="14" y1="11" x2="14" y2="17"></line>
              </svg>
              <span id="tracked-clear-label">Clear past entries</span>
            </button>
          </div>
        </div>
      </div>
    </section>

    <div id="compose">
      <div class="tabs" role="tablist">
        <button class="tab active" data-tab="text" type="button">Text</button>
        <button class="tab" data-tab="image" type="button">Image</button>
      </div>

      <form id="secret-form">
      <section id="panel-text" class="panel">
        <label for="content">Enter your secret</label>
        <textarea id="content" name="content" rows="8" placeholder="Type your message..."></textarea>
      </section>

      <section id="panel-image" class="panel" hidden>
        <label>Image</label>
        <div id="dropzone" class="dropzone" tabindex="0">
          <p>Drop image here or click to browse</p>
          <input type="file" id="file" accept="image/png,image/jpeg,image/gif,image/webp" hidden>
          <div id="preview" hidden>
            <span id="file-name"></span>
            <button type="button" id="clear-file" class="link">clear</button>
          </div>
        </div>
      </section>

      <label for="expires_in">Expires in</label>
      <select id="expires_in" name="expires_in">
        <option value="300">5 minutes</option>
        <option value="1800">30 minutes</option>
        <option value="3600">1 hour</option>
        <option value="14400">4 hours</option>
        <option value="43200">12 hours</option>
        <option value="86400" selected>24 hours</option>
        <option value="259200">3 days</option>
        <option value="604800">7 days</option>
      </select>

      <label for="passphrase">Passphrase (optional)</label>
      <input type="text" id="passphrase" name="passphrase">

      <label class="toggle">
        <input type="checkbox" id="track" name="track">
        <span class="toggle-slider" aria-hidden="true"></span>
        Track viewing status
      </label>

      <div id="label-wrap" hidden>
        <label for="label">Label (for your tracked list)</label>
        <input type="text" id="label" maxlength="60" placeholder="e.g. API key for Acme">
      </div>

      <p class="form-hint">
        After you create this, you won't be able to read the content again —
        not even from your own side. Save a copy elsewhere if you'll want one.
      </p>
      <button type="submit" id="submit-btn">Create Secret</button>
      <p class="error" id="sender-error" hidden></p>
    </form>
    </div>

    <section id="result" hidden>
      <h2 class="success">Secret created.</h2>
      <div class="url-box"><code id="result-url"></code></div>
      <button type="button" id="copy-url" class="copy-btn">Copy URL</button>
      <p id="result-expiry" class="muted"></p>
      <div id="status-widget" class="status-widget" hidden>
        <span class="status-label">Status</span>
        <span id="status-value" class="status-pill pending">pending</span>
        <span id="status-detail" class="muted-inline"></span>
      </div>
      <button type="button" id="create-another" class="link">Create another</button>
    </section>
  </main>
  <script src="/static/copy.js"></script>
  <script src="/static/sender.js"></script>
</body>
</html>
