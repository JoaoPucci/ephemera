# Dependabot configuration.
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Two ecosystems:
#   - pip:  reads requirements.txt AND requirements-dev.txt (Dependabot
#           automatically discovers both when they're in the same directory)
#   - npm:  reads package.json + package-lock.json
#
# Runs weekly (Mondays) rather than daily so a PR queue doesn't accumulate
# overnight. Security advisories always trigger immediately regardless of
# the regular schedule. Cap at 5 open PRs per ecosystem so a dormant audit
# backlog can't drown the repo.

version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps(pip)"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "deps(npm)"

  # GitHub Actions: tracks pinned action versions referenced from any
  # .github/workflows/*.yml (today: ci.yml). Dependabot opens a PR when a
  # referenced action publishes a new release, so `actions/checkout@v4`
  # and friends get a real upgrade cadence instead of drifting silently.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "deps(actions)"
