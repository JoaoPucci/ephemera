name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel an in-progress run if a newer push lands on the same ref. A branch
# that gets pushed three times in a minute runs CI once for the latest, not
# three times in a queue.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Python tests (pytest)
    runs-on: ubuntu-latest
    # Generous cap: the suite runs a lot of real bcrypt (cost 12) to cover
    # the constant-time auth paths. Local runs are ~8min; shared 2vCPU
    # runners roughly double that and occasionally spike. GH Actions is
    # free for public repos, so there's no reason to keep the cap tight.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install deps
        # --require-hashes makes pip verify every package against the hashes
        # in requirements-dev.txt. Any tampered wheel or unexpected transitive
        # aborts the install rather than silently proceeding.
        run: pip install --require-hashes -r requirements-dev.txt

      - name: Run pytest
        # bcrypt cost 12 is intentional -- ~5 minutes is expected.
        # --cov runs against the live app code; the report lands as both
        # terminal output (visible in the job log) and coverage.xml (kept
        # as an artifact and uploaded to Codecov for the README badge).
        run: pytest -q --cov --cov-report=xml --cov-report=term

      - name: Upload Python coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-python
          path: coverage.xml
          retention-days: 14

      - name: Upload Python coverage to Codecov
        # Tokenless mode for public repos. fail_ci_if_error=false so a
        # transient Codecov outage doesn't block the merge -- the artifact
        # above is the authoritative copy.
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          flags: python
          fail_ci_if_error: false

  frontend-unit:
    name: Frontend unit tests (Vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Run vitest
        # --coverage emits terminal summary, an HTML browseable report under
        # coverage/, and lcov.info that Codecov ingests below.
        run: npm run test:unit -- --coverage

      - name: Upload JS coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-js
          path: coverage/
          retention-days: 14

      - name: Upload JS coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          directory: coverage/
          flags: javascript
          fail_ci_if_error: false

  e2e:
    name: End-to-end smoke (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Create Python venv
        # tests-e2e/start.sh hard-codes ./venv/bin/python -- match locally.
        run: |
          python -m venv venv
          ./venv/bin/pip install --require-hashes -r requirements-dev.txt

      - name: Install npm deps
        run: npm ci

      - name: Install Playwright browser + system deps
        run: npx playwright install --with-deps chromium

      - name: Run Playwright
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  audit:
    name: Dependency audit (pip-audit + npm audit)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python deps (requirements-dev transitively includes runtime)
        # Disable hash checking for the audit pass: pip-audit itself pulls in
        # transitive deps that aren't in our locked set. The install that
        # actually runs in the backend / e2e jobs uses --require-hashes and
        # is the real integrity gate; pip-audit just needs to resolve the
        # graph to check advisories against it.
        #
        # --ignore-vuln CVE-2026-3219: pip 26.0.1 (the latest on PyPI at
        # the time of writing) is flagged -- concatenated tar+ZIP archives
        # are installed as ZIP regardless of filename (pypa/pip#13870).
        # Fix has merged to pip's main branch but no release has been cut
        # yet; once pip 26.1+ is on PyPI, drop this ignore. The runtime
        # exploitation vector against our deploys is blocked anyway:
        # `pip install --require-hashes -r requirements.txt` rejects any
        # archive whose SHA-256 doesn't match the committed hash.
        run: pip-audit --disable-pip --ignore-vuln CVE-2026-3219 -r requirements-dev.txt

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install npm deps
        run: npm ci

      - name: Audit npm deps
        # --audit-level=high: fail only on HIGH or CRITICAL advisories.
        # Low/moderate findings still appear in the job log (npm audit's
        # stderr is always informational) but don't block merges -- those
        # are typically toolchain-adjacent and handled via Dependabot PRs
        # at their own pace.
        run: npm audit --audit-level=high

  forbidden-paths:
    name: Forbidden file paths
    runs-on: ubuntu-latest
    # 3 min is generous for a one-file grep; the actual budget is dominated
    # by checkout on push-to-main, where fetch-depth=0 (see below) clones
    # the full history. 1 min was too tight -- observed overrun on the
    # first post-merge run.
    timeout-minutes: 3
    steps:
      # Depth depends on the event:
      #   pull_request -> fetch-depth: 0, because we diff base..head below
      #     (the PR's merge-ref mechanism makes this effectively shallow
      #     under the hood -- typically <1s).
      #   push         -> fetch-depth: 1, because we only use `git ls-files`
      #     below; no history needed, and a full-depth push-event clone is
      #     the slow path.
      - uses: actions/checkout@v6
        with:
          # Quote the values: in GitHub Actions expressions, bare `0` is
          # falsy, so `x && 0 || 1` always collapses to `1`. Using strings
          # ('0' is a non-empty string, thus truthy) makes the ternary
          # behave as intended; actions/checkout parses them as numbers.
          fetch-depth: ${{ github.event_name == 'pull_request' && '0' || '1' }}

      - name: Check for filenames that are never OK to commit
        run: |
          set -euo pipefail

          # Filename patterns that are always a commit-time bug, independent
          # of branch or author. Matches on filename only, not contents, so
          # docs or tests that *mention* these names in prose are unaffected.
          #
          # Keep this list tight: only entries whose commit is unambiguously
          # wrong. Speculative extras (*.pem, *.key) have real false-positive
          # risk (public certs, docs examples) and stay out.
          #
          # Blocklist:
          #   .env and common env-variant files (secrets)   ->  EPHEMERA_SECRET_KEY lives here in dev
          #   SQLite DB file + WAL/SHM sidecars             ->  live service state, never in the repo
          #   SSH private keys in their canonical names     ->  id_rsa, id_ed25519, etc.
          forbidden_re='^\.env$|^\.env\.(local|production|staging|development)$|\.db$|\.db-wal$|\.db-shm$|\.sqlite$|\.sqlite3$|(^|/)id_(rsa|dsa|ecdsa|ed25519)$'

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # On a PR, only scan files that actually changed in this PR's
            # diff -- a preexisting legal file won't re-trip the check.
            files=$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")
          else
            # On push-to-main, scan the full tree. Belt-and-braces in case
            # a branch-protection bypass ever lets a bad file through.
            files=$(git ls-files)
          fi

          matches=$(printf '%s\n' "$files" | grep -E "$forbidden_re" || true)
          if [[ -n "$matches" ]]; then
            echo "::error::Forbidden filename(s) in diff:"
            # Read line-by-line so we never word-split filenames that could
            # contain spaces. Quoting "$matches" through printf alone would
            # collapse the list onto one line; this loop preserves both
            # safety (no SC2086 unquoted expansion) and per-line formatting.
            while IFS= read -r m; do
              printf '  %s\n' "$m"
            done <<< "$matches"
            echo ""
            echo "These names are on the commit-time blocklist because they"
            echo "almost always contain secrets or local state. If this is a"
            echo "genuine false positive, narrow the regex in ci.yml rather"
            echo "than committing the file."
            exit 1
          fi
          echo "No forbidden paths in diff."
