name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel an in-progress run if a newer push lands on the same ref. A branch
# that gets pushed three times in a minute runs CI once for the latest, not
# three times in a queue.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Python tests (pytest)
    runs-on: ubuntu-latest
    # Generous cap: the suite runs a lot of real bcrypt (cost 12) to cover
    # the constant-time auth paths. Local runs are ~8min; shared 2vCPU
    # runners roughly double that and occasionally spike. GH Actions is
    # free for public repos, so there's no reason to keep the cap tight.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install deps
        # --require-hashes makes pip verify every package against the hashes
        # in requirements-dev.txt. Any tampered wheel or unexpected transitive
        # aborts the install rather than silently proceeding.
        run: pip install --require-hashes -r requirements-dev.txt

      - name: Run pytest
        # bcrypt cost 12 is intentional -- ~5 minutes is expected.
        run: pytest -q

  frontend-unit:
    name: Frontend unit tests (Vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Run vitest
        run: npm run test:unit

  e2e:
    name: End-to-end smoke (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Create Python venv
        # tests-e2e/start.sh hard-codes ./venv/bin/python -- match locally.
        run: |
          python -m venv venv
          ./venv/bin/pip install --require-hashes -r requirements-dev.txt

      - name: Install npm deps
        run: npm ci

      - name: Install Playwright browser + system deps
        run: npx playwright install --with-deps chromium

      - name: Run Playwright
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  audit:
    name: Dependency audit (pip-audit + npm audit)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python deps (requirements-dev transitively includes runtime)
        # Disable hash checking for the audit pass: pip-audit itself pulls in
        # transitive deps that aren't in our locked set. The install that
        # actually runs in the backend / e2e jobs uses --require-hashes and
        # is the real integrity gate; pip-audit just needs to resolve the
        # graph to check advisories against it.
        #
        # --ignore-vuln CVE-2026-3219: pip 26.0.1 (the latest on PyPI at
        # the time of writing) is flagged -- concatenated tar+ZIP archives
        # are installed as ZIP regardless of filename (pypa/pip#13870).
        # Fix has merged to pip's main branch but no release has been cut
        # yet; once pip 26.1+ is on PyPI, drop this ignore. The runtime
        # exploitation vector against our deploys is blocked anyway:
        # `pip install --require-hashes -r requirements.txt` rejects any
        # archive whose SHA-256 doesn't match the committed hash.
        run: pip-audit --disable-pip --ignore-vuln CVE-2026-3219 -r requirements-dev.txt

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install npm deps
        run: npm ci

      - name: Audit npm deps
        # --audit-level=high: fail only on HIGH or CRITICAL advisories.
        # Low/moderate findings still appear in the job log (npm audit's
        # stderr is always informational) but don't block merges -- those
        # are typically toolchain-adjacent and handled via Dependabot PRs
        # at their own pace.
        run: npm audit --audit-level=high
