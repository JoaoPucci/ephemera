name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel an in-progress run if a newer push lands on the same ref. A branch
# that gets pushed three times in a minute runs CI once for the latest, not
# three times in a queue.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Workflow-level grant. The reusable test-suite called below needs
# id-token: write for Codecov OIDC uploads (backend + frontend-unit jobs).
# A reusable workflow can downgrade these per-job but cannot elevate
# above the caller -- so the cap lives here.
permissions:
  contents: read
  id-token: write

jobs:
  # Pytest, Vitest, Playwright, pip-audit, npm audit. Defined once in the
  # reusable workflow and called from both ci.yml (here) and deploy.yml,
  # so the test definition can't drift between PR-time verification and
  # release-time re-verification.
  test-suite:
    uses: ./.github/workflows/_test-suite.yml

  forbidden-paths:
    name: Forbidden file paths
    runs-on: ubuntu-latest
    # 3 min is generous for a one-file grep; the actual budget is dominated
    # by checkout on push-to-main, where fetch-depth=0 (see below) clones
    # the full history. 1 min was too tight -- observed overrun on the
    # first post-merge run.
    timeout-minutes: 3
    # PR-specific (compares base..head); not relevant on a tag-cut, so
    # this job stays in ci.yml rather than the reusable test-suite.
    steps:
      # Depth depends on the event:
      #   pull_request -> fetch-depth: 0, because we diff base..head below
      #     (the PR's merge-ref mechanism makes this effectively shallow
      #     under the hood -- typically <1s).
      #   push         -> fetch-depth: 1, because we only use `git ls-files`
      #     below; no history needed, and a full-depth push-event clone is
      #     the slow path.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Quote the values: in GitHub Actions expressions, bare `0` is
          # falsy, so `x && 0 || 1` always collapses to `1`. Using strings
          # ('0' is a non-empty string, thus truthy) makes the ternary
          # behave as intended; actions/checkout parses them as numbers.
          fetch-depth: ${{ github.event_name == 'pull_request' && '0' || '1' }}

      - name: Check for filenames that are never OK to commit
        run: |
          set -euo pipefail

          # Filename patterns that are always a commit-time bug, independent
          # of branch or author. Matches on filename only, not contents, so
          # docs or tests that *mention* these names in prose are unaffected.
          #
          # Keep this list tight: only entries whose commit is unambiguously
          # wrong. Speculative extras (*.pem, *.key) have real false-positive
          # risk (public certs, docs examples) and stay out.
          #
          # Blocklist:
          #   .env and common env-variant files (secrets)   ->  EPHEMERA_SECRET_KEY lives here in dev
          #   SQLite DB file + WAL/SHM sidecars             ->  live service state, never in the repo
          #   SSH private keys in their canonical names     ->  id_rsa, id_ed25519, etc.
          forbidden_re='^\.env$|^\.env\.(local|production|staging|development)$|\.db$|\.db-wal$|\.db-shm$|\.sqlite$|\.sqlite3$|(^|/)id_(rsa|dsa|ecdsa|ed25519)$'

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # On a PR, only scan files that actually changed in this PR's
            # diff -- a preexisting legal file won't re-trip the check.
            files=$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")
          else
            # On push-to-main, scan the full tree. Belt-and-braces in case
            # a branch-protection bypass ever lets a bad file through.
            files=$(git ls-files)
          fi

          matches=$(printf '%s\n' "$files" | grep -E "$forbidden_re" || true)
          if [[ -n "$matches" ]]; then
            echo "::error::Forbidden filename(s) in diff:"
            # Read line-by-line so we never word-split filenames that could
            # contain spaces. Quoting "$matches" through printf alone would
            # collapse the list onto one line; this loop preserves both
            # safety (no SC2086 unquoted expansion) and per-line formatting.
            while IFS= read -r m; do
              printf '  %s\n' "$m"
            done <<< "$matches"
            echo ""
            echo "These names are on the commit-time blocklist because they"
            echo "almost always contain secrets or local state. If this is a"
            echo "genuine false positive, narrow the regex in ci.yml rather"
            echo "than committing the file."
            exit 1
          fi
          echo "No forbidden paths in diff."
