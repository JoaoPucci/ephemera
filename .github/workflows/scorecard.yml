# OSSF Scorecard
#
# Weekly supply-chain security assessment against the OpenSSF's ~18-check
# framework: branch protection, pinned dependencies, token permissions,
# SAST coverage, CII best practices, maintained status, dependency update
# cadence, signed releases, etc. Publishes results to the OpenSSF REST
# API (enables the Scorecard badge) and uploads SARIF to GitHub's
# Code-scanning dashboard alongside CodeQL findings.
#
# Source: https://github.com/ossf/scorecard-action
# Checks: https://github.com/ossf/scorecard/blob/main/docs/checks.md
# Badge:  https://api.securityscorecards.dev/projects/github.com/JoaoPucci/ephemera/badge
#
# NOTE: The Branch-Protection check requires admin:read on the repo,
# which the default GITHUB_TOKEN lacks. To have branch-protection
# reflected in the score, create a fine-grained PAT with contents:read
# and administration:read, store it as a secret named SCORECARD_TOKEN,
# and uncomment the `repo_token` line below. Without it, that specific
# check returns inconclusive (?) instead of contributing to the score.

name: Scorecard supply-chain security

on:
  # Re-score when branch-protection rules change -- directly affects the
  # Branch-Protection check.
  branch_protection_rule:
  # Keeps the Maintained check reporting recent activity.
  schedule:
    - cron: '31 22 * * 2'   # Tuesdays, 22:31 UTC
  push:
    branches: [main]

# Workflow default: read-only. Job-level permissions below grant only
# what Scorecard specifically needs.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # `publish_results: true` only works from the default branch. Skip
    # the job otherwise so scheduled runs on non-default refs don't try
    # (and fail) to publish.
    if: github.event.repository.default_branch == github.ref_name
    permissions:
      security-events: write   # upload SARIF to Code-scanning dashboard
      id-token: write          # publish to OpenSSF REST API (badge)

    steps:
      # Actions pinned by SHA per Scorecard's own Pinned-Dependencies
      # check. Dependabot's github-actions ecosystem config bumps these
      # when new releases ship (SHA + version both update in the PR).
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Per Scorecard's Token-Permissions guidance: don't leave the
          # checkout's git credentials around for later steps to pick up.
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
          # repo_token: ${{ secrets.SCORECARD_TOKEN }}   # see note at top of file

      - name: Upload artifact
        # SARIF output is also available in the Actions tab for 5 days
        # -- useful when debugging a score drop without having to click
        # into the code-scanning dashboard.
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        # Merges Scorecard findings into the same Security -> Code-scanning
        # view as CodeQL results, with their own tool category so they're
        # easy to filter. SHA-pinned like every other action in this file,
        # per Scorecard's own Pinned-Dependencies guidance; Dependabot
        # bumps both the SHA and the trailing comment together.
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        with:
          sarif_file: results.sarif
