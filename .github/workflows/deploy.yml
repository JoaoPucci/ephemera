name: deploy

# Fires on a semver tag landing on origin. Pre-release tags (anything with
# a dash, e.g. `v1.2.3-rc1`) are deliberately excluded: deploying those
# should be an explicit, hand-driven act, not something that happens
# because the pattern glob was loose.
on:
  push:
    tags:
      - 'v*.*.*'
      - '!v*.*.*-*'

# Serialise deploys. `cancel-in-progress: false` lets an in-flight deploy
# finish cleanly before the next one starts. A job that gets cancelled
# mid-deploy leaves the server in an ambiguous state (new code checked
# out, service maybe restarted, maybe not).
concurrency:
  group: deploy
  cancel-in-progress: false

# Workflow-level grant. Most jobs only need contents:read; the verify job
# below calls the reusable test-suite which uploads coverage to Codecov via
# OIDC, so id-token: write has to be available. The deploy job itself
# downgrades to contents:read explicitly (least-privilege).
permissions:
  contents: read
  id-token: write

jobs:
  # Re-run the full test+audit surface against the tagged ref before we
  # touch the droplet. Tests passing on the merge PR doesn't mean tests
  # pass NOW: a fresh CVE in pip-audit, a new npm advisory, or a stale
  # transitive dep can fail at deploy time even when the merge that
  # produced this tag was green. Sharing the workflow with ci.yml means
  # the test definition can't drift between PR-time and deploy-time.
  verify:
    name: Re-verify tests + audit on the tagged ref
    uses: ./.github/workflows/_test-suite.yml

  deploy:
    name: Tag-triggered deploy
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Environment hook. If the repo later configures required-reviewer
    # gating under Settings -> Environments -> production, that gate
    # fires here without a workflow change. Without protection rules
    # configured, this is just a label.
    environment: production
    # Override the workflow-level id-token grant: the deploy job only
    # needs contents:read for actions/checkout. Tailscale + SSH carry
    # their own credentials via secrets; nothing here needs the OIDC
    # token that the verify job above did.
    permissions:
      contents: read
    # Discord-notify steps below gate on `env.DISCORD_WEBHOOK_URL != ''`.
    # `if:` expressions can't read `secrets.*` directly, so the secret
    # is hoisted to a job-level env var here (still redacted in logs).
    # When the secret is unset, the deploy still runs, the gates just
    # silently skip the notify steps -- a fork or a fresh checkout
    # without the secret configured doesn't fail the deploy.
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
    steps:
      - name: Open Discord deploy thread
        # First step of the deploy job. Posts a message to the configured
        # Discord webhook with `thread_name` set; Discord creates a fresh
        # thread on the webhook's channel and replies with that thread's
        # `channel_id`, which we capture for the result-notify step below.
        # Posted before the irreversible parts (Tailscale join, SSH, deploy.sh)
        # so the thread exists from t=0 and the user has a place to watch
        # the deploy unfold even if a later step blows up.
        #
        # Auxiliary by design: a webhook outage, rate-limit, or
        # forum-tag misconfiguration MUST NOT block the deploy.
        # The script catches every error path explicitly and exits 0;
        # the result-notify step's `thread_id != ''` gate is what
        # decides whether to follow up. `continue-on-error: true` is
        # belt-and-braces in case a future curl / jq invocation slips
        # through the explicit handling.
        id: discord-thread
        if: env.DISCORD_WEBHOOK_URL != ''
        continue-on-error: true
        env:
          TAG: ${{ github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set +x
          payload=$(jq -n --arg tag "$TAG" --arg run "$RUN_URL" '{
            thread_name: "Deploy \($tag)",
            content: ":rocket: Deploying **\($tag)**\nRun: <\($run)>"
          }')
          if ! response=$(curl -sS -w '\n%{http_code}' -X POST "${DISCORD_WEBHOOK_URL}?wait=true" \
            -H 'Content-Type: application/json' \
            -d "$payload"); then
            echo "::warning::Discord webhook unreachable -- continuing deploy without notifications"
            exit 0
          fi
          status=$(printf '%s' "$response" | tail -n1)
          body=$(printf '%s' "$response" | sed '$d')
          if [ "$status" != "200" ] && [ "$status" != "201" ]; then
            echo "::warning::Discord webhook returned ${status} -- continuing deploy without notifications"
            echo "::warning::Response body: ${body}"
            exit 0
          fi
          thread_id=$(printf '%s' "$body" | jq -r '.channel_id // empty')
          if [ -z "$thread_id" ]; then
            echo "::warning::Discord response missing channel_id -- continuing deploy without notifications"
            exit 0
          fi
          echo "thread_id=${thread_id}" >> "$GITHUB_OUTPUT"

      - name: Join tailnet
        # Ephemeral OAuth-based join; the device disappears when the job
        # ends. `tags: tag:ci` lets the tailnet's ACL pin what these
        # ephemeral clients are allowed to reach.
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci

      - name: Configure SSH
        # Key + pinned known_hosts. The known_hosts entry guards against
        # a tailnet-side MITM; secrets are redacted from logs, and the
        # shell keeps +x off so nothing leaks even on error.
        run: |
          set +x
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy
        # `GITHUB_REF_NAME` is the tag (e.g. v0.6.0) on a tag-push event.
        # The forced-command on the server reads it from SSH_ORIGINAL_COMMAND,
        # re-validates the regex, acquires a flock, and invokes deploy.sh.
        # stdout from the server-side script is streamed back here, so a
        # failure at any deploy step surfaces as a failing CI step.
        env:
          TAG: ${{ github.ref_name }}
          SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
        run: |
          set +x
          ssh -o BatchMode=yes -i ~/.ssh/id_ed25519 "deploy@${SSH_HOST}" "${TAG}"

      - name: Notify Discord deploy result
        # Posts the deploy outcome (success / failure / cancelled) into
        # the same thread opened above. `if: always()` so the notify
        # fires regardless of which earlier step failed; the additional
        # gate on `steps.discord-thread.outputs.thread_id` covers the
        # "no webhook configured" path (the open-thread step skipped or
        # silently bailed -- nothing to follow up on). Release URL on
        # success resolves to the gh release that scripts/release.sh
        # creates; on failure, the run URL points at the workflow log
        # so the operator can jump straight to the failing step's
        # output.
        #
        # Same auxiliary-by-design posture as the opener: a Discord
        # outage post-deploy MUST NOT mark the workflow red when the
        # deploy itself succeeded. `continue-on-error: true` plus
        # explicit script-side handling keep the job's final status
        # reflecting what happened on the droplet, not what happened
        # to a notification API call.
        if: always() && steps.discord-thread.outputs.thread_id != ''
        continue-on-error: true
        env:
          THREAD_ID: ${{ steps.discord-thread.outputs.thread_id }}
          TAG: ${{ github.ref_name }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RELEASE_URL: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}
        run: |
          set +x
          case "$JOB_STATUS" in
            success)
              content=":white_check_mark: **${TAG}** deployed\nRelease: <${RELEASE_URL}>"
              ;;
            cancelled)
              content=":warning: Deploy of **${TAG}** cancelled\nRun: <${RUN_URL}>"
              ;;
            *)
              content=":x: Deploy of **${TAG}** failed (${JOB_STATUS})\nRun: <${RUN_URL}>"
              ;;
          esac
          if ! curl -sS -X POST "${DISCORD_WEBHOOK_URL}?thread_id=${THREAD_ID}&wait=true" \
            -H 'Content-Type: application/json' \
            -d "$(jq -n --arg c "$content" '{content: $c}')" >/dev/null; then
            echo "::warning::Discord result-notification POST failed -- deploy status above is authoritative"
          fi
