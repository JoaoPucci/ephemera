# Lint
#
# Fast static-analysis tools running in parallel with the rest of CI:
#
#   Ruff         -- Python lint + format + import sort + modernizer
#                   config in pyproject.toml under [tool.ruff]
#   Biome        -- JavaScript / CSS lint + format
#                   config in biome.json at the repo root
#   shellcheck   -- bash script correctness (no config; defaults are the
#                   industry standard)
#   actionlint   -- GitHub Actions workflow correctness (no config)
#   mypy         -- Python static type-checker (separate job; needs
#                   setup-python + install). Strategy B per-module
#                   ratchet; baseline + cleanup order documented in
#                   pyproject.toml's [tool.mypy] block.
#
# The CLI-action checks are grouped into a single `lint` job because
# the runner-provisioning cost per job is larger than any of the checks
# themselves. mypy gets its own job because it needs Python set up.

name: Lint

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # actionlint via reviewdog uses reporter: github-check below, which
  # writes a separate check run. With `permissions:` declared, every
  # unspecified scope defaults to `none`, so `checks: write` has to be
  # named explicitly for the step to be able to post.
  checks: write

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Ruff (check + format)
        uses: astral-sh/ruff-action@v3
        with:
          args: check --output-format=github

      - name: Ruff format check
        uses: astral-sh/ruff-action@v3
        with:
          args: format --check

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install npm deps
        run: npm ci

      - name: Biome (check)
        run: ./node_modules/.bin/biome ci --reporter=github

      - name: shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts
          # ephemera-deploy-entry has no extension but starts with a bash
          # shebang; pick it up explicitly.
          additional_files: scripts/deploy/ephemera-deploy-entry

      - name: actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          # github-pr-review has no PR context on push events and would
          # fail the step on push-to-main runs. github-check works on
          # both PR and push: it posts findings as a separate check run
          # rather than PR-inline review comments.
          reporter: github-check
          filter_mode: nofilter
          fail_level: error

  mypy:
    name: Mypy (Python types)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install deps
        # --require-hashes verifies every package against the
        # lockfile hashes, matching the rest of the CI's posture.
        # We only need mypy + the project's runtime deps so mypy
        # can resolve `from app...` imports; the full dev suite is
        # gated by the test workflow, not by lint.
        run: pip install --require-hashes -r requirements-dev.txt

      - name: Mypy
        run: mypy
