# pybabel extraction config. Consumed by scripts/i18n.sh.
#
# Python sources get the default extractor. Templates are parsed as Jinja2
# with the i18n extension so `{{ _("...") }}` and `{% trans %}...{% endtrans %}`
# both land in messages.pot.
#
# Patterns are relative to the input path pybabel gets on the command line
# (i.e. `app/` from scripts/i18n.sh extract), not to the repo root. Pairing
# `app/**.py` here with `app/` on the CLI would make Babel look for
# `app/app/**.py` -- a silent-empty-output footgun.

[python: **.py]

[jinja2: templates/**.html]
extensions=jinja2.ext.i18n
