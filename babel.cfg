# pybabel extraction config. Consumed by scripts/i18n.sh.
#
# Python sources get the default extractor. Templates are parsed as Jinja2
# with the i18n extension so `{{ _("...") }}` and `{% trans %}...{% endtrans %}`
# both land in messages.pot.

[python: app/**.py]

[jinja2: app/templates/**.html]
extensions=jinja2.ext.i18n
